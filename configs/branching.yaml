# Phase 2: Semantic Branching Configuration
# Extends swebench_local.yaml patterns for mini-swe-agent compatibility

agent:
  system_template: |
    You are a helpful assistant that can interact with a computer shell to solve programming tasks.
  instance_template: |
    <pr_description>
    Consider the following PR description:
    {{task}}
    </pr_description>

    <instructions>
    # Task Instructions

    ## Overview

    You're a software engineer interacting continuously with a computer by submitting commands.
    You'll be helping implement necessary changes to meet requirements in the PR description.
    Your task is specifically to make changes to non-test files in the current directory in order to fix the issue described in the PR description in a way that is general and consistent with the codebase.
    <IMPORTANT>This is an interactive process where you will think and issue AT LEAST ONE command, see the result, then think and issue your next command(s).</important>

    For each response:

    1. Include a THOUGHT section explaining your reasoning and what you're trying to accomplish
    2. Provide exactly ONE bash command in a code block

    ## Important Boundaries

    - MODIFY: Regular source code files in /testbed (this is the working directory for all your subsequent commands)
    - DO NOT MODIFY: Tests, configuration files (pyproject.toml, setup.cfg, etc.)

    ## Recommended Workflow

    1. Analyze the codebase by finding and reading relevant files
    2. Create a script to reproduce the issue
    3. Edit the source code to resolve the issue
    4. Verify your fix works by running your script again
    5. Test edge cases to ensure your fix is robust

    ## Command Execution Rules

    You are operating in an environment where

    1. You issue exactly one command
    2. The system executes the command in a subshell
    3. You see the result
    4. You write your next command

    Each response should include:

    1. **Reasoning text** where you explain your analysis and plan
    2. Exactly one bash command in triple backticks

    **CRITICAL REQUIREMENTS:**

    - Your response SHOULD include reasoning text explaining what you're doing
    - Your response MUST include EXACTLY ONE bash code block
    - Directory or environment variable changes are not persistent. Every action is executed in a new subshell.
    - However, you can prefix any action with `MY_ENV_VAR=MY_VALUE cd /path/to/working/dir && ...` or write/load environment variables from files

    Example of a CORRECT response:
    <example_response>
    THOUGHT: I need to understand the structure of the repository. Let me check what files are in the current directory.

    ```mswea_bash_command
    ls -la /testbed
    ```
    </example_response>

    ### Create a new file:

    ```mswea_bash_command
    cat <<'EOF' > newfile.py
    import numpy as np
    hello = "world"
    print(hello)
    EOF
    ```

    ### Edit files with sed:

    ```mswea_bash_command
    sed -i 's/old_string/new_string/g' filename.py
    ```

    ### View file content:

    ```mswea_bash_command
    nl -ba filename.py | sed -n '10,20p'
    ```

    ## Environment Details

    - You have a full Linux shell environment
    - Always use non-interactive flags (-y, -f) for commands
    - Avoid interactive tools like vi, nano, or any that require user input

    ## Submission

    When you've completed your work, you MUST submit your changes as a git patch.
    Follow these steps IN ORDER, with SEPARATE commands:

    Step 1: Create the patch file
    Run `cd /testbed && git diff -- path/to/file1 path/to/file2 > patch.txt` listing only the source files you modified.
    Do NOT commit your changes.

    <IMPORTANT>
    The patch must only contain changes to the specific source files you modified to fix the issue.
    Do not submit file creations or changes to any of the following files:
    - test and reproduction files
    - helper scripts, tests, or tools that you created
    - installation, build, packaging, configuration, or setup scripts
    - binary or compiled files
    </IMPORTANT>

    Step 2: Verify your patch
    Inspect patch.txt to confirm it only contains your intended changes.

    Step 3: Submit (EXACT command required)
    You MUST use this EXACT command to submit:

    ```mswea_bash_command
    echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT && cat /testbed/patch.txt
    ```

    If the command fails (nonzero exit status), it will not submit.

    <CRITICAL>
    - Creating/viewing the patch and submitting it MUST be separate commands.
    - You CANNOT continue working on this task after submitting.
    </CRITICAL>
    </instructions>
  step_limit: 250
  cost_limit: 0.

model:
  model_name: "openai/qwen3-coder"
  model_class: litellm_textbased
  model_kwargs:
    drop_params: true
    temperature: 0.0
    api_base: "http://localhost:8000/v1"
    api_key: "dummy"
    timeout: 120
  cost_tracking: "ignore_errors"
  observation_template: |
    {% if output.exception_info -%}
    <exception>{{output.exception_info}}</exception>
    {% endif -%}
    <returncode>{{output.returncode}}</returncode>
    {% if output.output | length < 10000 -%}
    <output>
    {{ output.output -}}
    </output>
    {%- else -%}
    <warning>
    The output of your last command was too long.
    Please try a different command that produces less output.
    </warning>
    {%- set elided_chars = output.output | length - 10000 -%}
    <output_head>
    {{ output.output[:5000] }}
    </output_head>
    <elided_chars>
    {{ elided_chars }} characters elided
    </elided_chars>
    <output_tail>
    {{ output.output[-5000:] }}
    </output_tail>
    {%- endif -%}
  format_error_template: |
    Format error:

    <error>
    {{error}}
    </error>

    Please always provide EXACTLY ONE action in triple backticks, found {{actions|length}} actions.
    If you want to end the task, please issue the following command: `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`
    without any other command.

environment:
  cwd: "/testbed"
  timeout: 60
  interpreter: ["bash", "-c"]
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: "-R"
    PIP_PROGRESS_BAR: "off"
    TQDM_DISABLE: "1"

branching:
  # Strategy proposal settings (replaces SDLG/temperature)
  n_strategies: 5             # How many strategies to propose — more = wider exploration
  diversity_method: "strategy_proposal"

  # Clustering settings
  entailment_threshold: 0.7   # For bidirectional entailment (higher = more clusters; raised from 0.5 to prevent over-merging)
  entropy_threshold: 0.0      # Always branch (we want all unique strategies)

  max_trajectories: 30        # Cap on total trajectories (strategies × SDLG alternatives)
  max_search_steps: 30        # Hard cap on search steps (fallback)
  min_search_steps: 8         # Minimum search steps before saturation can trigger
  relevance_threshold: 0.5    # Relevance scoring threshold (context-conditioned entailment per Kuhn et al.)
  low_relevance_streak: 3     # Transition to proposal after N consecutive low-relevance steps
  patch_read_budget: 5        # Max read-only steps in PATCH before nudging toward write

  # SDLG settings (diverse implementations within each strategy)
  sdlg_enabled: true           # SDLG enabled — DeBERTa runs in separate NLI server process
  sdlg_n_alternatives: 5      # Number of SDLG alternatives per strategy (including greedy)
  sdlg_top_k: 20              # Top-K substitution candidates to evaluate per token position

nli:
  server_url: "http://localhost:8100"  # DeBERTa NLI server (separate process)
  model_name: "microsoft/deberta-large-mnli"
  model_path: "D:/models/deberta-large-mnli"
  device: "cpu"

paths:
  results_dir: "results/branching"
  predictions_file: "results/branching/predictions.jsonl"
