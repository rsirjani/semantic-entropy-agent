# Baseline agent configuration
agent:
  max_steps: 30
  max_tokens_per_step: 4096
  temperature: 0.0

model:
  base_url: "http://localhost:8000/v1"
  model_name: "qwen3-coder"
  api_key: "dummy"

evaluation:
  dataset: "SWE-bench/SWE-bench_Verified"
  split: "test"
  run_id: "baseline_v1"
  max_workers: 1
  timeout: 1800

paths:
  results_dir: "results/baseline"
  predictions_file: "results/baseline/predictions.jsonl"
  summary_file: "results/baseline/summary.json"
